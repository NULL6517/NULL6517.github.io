<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材料库 - 瑞圣合空间有限公司</title>
    <link rel="stylesheet" href="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/material-hub.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                瑞圣合空间有限公司
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item active"><a class="nav-link" href="material-hub.html">材料库</a></li>
                    <li class="nav-item"><a class="nav-link" href="material-detail.html">材料详情</a></li>
                    <li class="nav-item"><a class="nav-link" href="portfolio.html">作品集</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">采购单</a></li>
                    <li class="nav-item"><a class="nav-link" href="about-us.html">关于我们</a></li>
                </ul>
            </div>
        </div>
    </nav>



    <section class="container">
        <div class="search-section fade-in">
            <h3 class="text-center mb-4">查找您需要的装修材料</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入材料名称、类别或规格进行搜索...">
                <button onclick="searchMaterials()"><i class="fas fa-search me-2"></i>搜索</button>
            </div>
        </div>
        
        <div class="filter-section fade-in delay-1">
            <div class="row">
                <div class="col-md-2">
                    <div class="filter-group">
                        <div class="filter-title">材料类别</div>
                        <div class="filter-options">
                            <button class="filter-option active" onclick="filterByCategory('all', this)">全部</button>
                            <button class="filter-option" onclick="filterByCategory('floor', this)">地板</button>
                            <button class="filter-option" onclick="filterByCategory('tile', this)">瓷砖</button>
                            <button class="filter-option" onclick="filterByCategory('paint', this)">涂料</button>
                            <button class="filter-option" onclick="filterByCategory('door', this)">门窗</button>
                            <button class="filter-option" onclick="filterByCategory('hardware', this)">五金</button>
                            <button class="filter-option" onclick="filterByCategory('bathroom', this)">卫浴</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="filter-group">
                        <div class="filter-title">价格范围</div>
                        <div class="filter-options">
                            <button class="filter-option active" onclick="filterByPrice('all', this)">全部</button>
                            <button class="filter-option" onclick="filterByPrice('0-100', this)">¥0-100</button>
                            <button class="filter-option" onclick="filterByPrice('100-500', this)">¥100-500</button>
                            <button class="filter-option" onclick="filterByPrice('500-1000', this)">¥500-1000</button>
                            <button class="filter-option" onclick="filterByPrice('1000+', this)">¥1000+</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="filter-group">
                        <div class="filter-title">品牌</div>
                        <div class="filter-options">
                            <button class="filter-option active" onclick="filterByBrand('all', this)">全部</button>
                            <button class="filter-option" onclick="filterByBrand('nature', this)">大自然</button>
                            <button class="filter-option" onclick="filterByBrand('marco', this)">马可波罗</button>
                            <button class="filter-option" onclick="filterByBrand('nippon', this)">立邦</button>
                            <button class="filter-option" onclick="filterByBrand('dulux', this)">多乐士</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="filter-group">
                        <div class="filter-title">风格</div>
                        <div class="filter-options">
                            <button class="filter-option active" onclick="filterByStyle('all', this)">全部</button>
                            <button class="filter-option" onclick="filterByStyle('modern', this)">现代简约</button>
                            <button class="filter-option" onclick="filterByStyle('european', this)">欧式风格</button>
                            <button class="filter-option" onclick="filterByStyle('chinese', this)">中式风格</button>
                            <button class="filter-option" onclick="filterByStyle('minimalist', this)">极简风格</button>
                            <button class="filter-option" onclick="filterByStyle('industrial', this)">工业风格</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="filter-group">
                        <div class="filter-title">排序方式</div>
                        <div class="filter-options">
                            <button class="filter-option active" onclick="sortMaterials('default', this)">默认</button>
                            <button class="filter-option" onclick="sortMaterials('price-asc', this)">价格从低到高</button>
                            <button class="filter-option" onclick="sortMaterials('price-desc', this)">价格从高到低</button>
                            <button class="filter-option" onclick="sortMaterials('newest', this)">新品优先</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="container mt-4">
        <div id="loadingState" class="text-center py-5" style="display: none;">
            <div class="spinner-border" role="status">
                <span class="sr-only">加载中...</span>
            </div>
            <p class="mt-2">正在搜索材料，请稍候...</p>
        </div>
        <div id="errorState" class="text-center py-5" style="display: none;">
            <i class="fas fa-exclamation-circle text-danger fa-3x"></i>
            <p class="mt-2 text-danger">搜索失败，请重试</p>
            <button class="btn btn-primary mt-2" onclick="filterMaterials()">重新搜索</button>
        </div>
        <div id="noResultsState" class="text-center py-5" style="display: none;">
            <i class="fas fa-search text-muted fa-3x"></i>
            <p class="mt-2 text-muted">未找到匹配的材料</p>
            <button class="btn btn-primary mt-2" onclick="clearSearch()">清除搜索</button>
        </div>
        <div class="material-grid fade-in delay-2" id="materialGrid">
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5>瑞圣合空间有限公司</h5>
                    <p>专业装修材料供应商 - 品质保证，服务至上</p>
                </div>



                <div class="col-md-4 mb-4">
                    <h5>联系我们</h5>
                    <p><i class="fas fa-phone me-2"></i> 13607171285</p>
                    <p><i class="fas fa-map-marker-alt me-2"></i> 湖北省·武汉市·硚口区</p>
            <p>古田二路龙湖春江郦城二期底商13栋-402</p>
                </div>
            </div>
            <hr class="bg-light">
            <p class="text-center mb-0">&copy; 2025 瑞圣合空间有限公司</p>
        </div>
    </footer>

    <script src="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/jquery-3.5.1.slim.min.js"></script>
    <script src="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/popper.min.js"></script>
    <script src="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/bootstrap.min.js"></script>
    <!-- 兼容性polyfill -->
    <script src="https://cdn.jsdelivr.net/npm/polyfill.io/v3/polyfill.min.js?features=URLSearchParams,fetch"></script>
    <script src="../js/common.js"></script>
    <script src="../js/material-hub.js"></script>
</body>
</html>
