<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集管理 - 瑞圣合空间有限公司</title>
    <link rel="stylesheet" href="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/material-management.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../../user端/html/index.html">
                瑞圣合空间有限公司
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="../../user端/html/index.html">用户端首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="material-management.html">材料管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="add-material.html">添加材料</a></li>
                    <li class="nav-item"><a class="nav-link active" href="portfolio-management.html">作品集管理</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container text-center">
            <h1 class="display-4 font-weight-bold mb-4">作品集管理系统</h1>
            <p class="lead mb-4">管理员可以增删改查作品集</p>
        </div>
    </section>

    <main class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h5 class="mb-0"><i class="fas fa-database me-2"></i>作品集列表</h5>
                    </div>
                    <div class="col-md-6 text-right">
                        <button class="btn btn-light btn-sm" onclick="openAddModal()">
                            <i class="fas fa-plus me-1"></i>添加新作品
                        </button>
                        <button class="btn btn-light btn-sm" onclick="exportData()">
                            <i class="fas fa-download me-1"></i>导出数据
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索作品名称...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-control" id="styleFilter">
                            <option value="">全部风格</option>
                            <option value="modern">现代简约</option>
                            <option value="european">欧式风格</option>
                            <option value="chinese">中式风格</option>
                            <option value="minimalist">极简风格</option>
                            <option value="industrial">工业风格</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary" onclick="filterPortfolio()">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>作品名称</th>
                                <th>风格</th>
                                <th>类型</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="portfolioTableBody">
                        </tbody>
                    </table>
                </div>

                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-center" id="pagination">
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addPortfolioModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加新作品</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="addPortfolioForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>作品名称</label>
                                    <input type="text" class="form-control" id="portfolioName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>风格</label>
                                    <select class="form-control" id="portfolioStyle" required>
                                        <option value="">选择风格</option>
                                        <option value="modern">现代简约</option>
                                        <option value="european">欧式风格</option>
                                        <option value="chinese">中式风格</option>
                                        <option value="minimalist">极简风格</option>
                                        <option value="industrial">工业风格</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>类型</label>
                                    <select class="form-control" id="portfolioType" required>
                                        <option value="">选择类型</option>
                                        <option value="vr">VR作品</option>
                                        <option value="traditional">传统作品</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>VR链接</label>
                                    <input type="text" class="form-control" id="portfolioVrLink" placeholder="如果是VR作品，请输入VR链接">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>分类</label>
                                    <select class="form-control" id="portfolioCategory" required>
                                        <option value="">选择分类</option>
                                        <option value="住宅公寓">住宅公寓</option>
                                        <option value="别墅豪宅">别墅豪宅</option>
                                        <option value="酒店民宿">酒店民宿</option>
                                        <option value="样板间">样板间</option>
                                        <option value="商业空间">商业空间</option>
                                        <option value="公共空间">公共空间</option>
                                        <option value="医疗康养">医疗康养</option>
                                        <option value="售楼处">售楼处</option>
                                        <option value="办公空间">办公空间</option>
                                        <option value="学校教育">学校教育</option>
                                        <option value="建筑">建筑</option>
                                        <option value="餐饮空间">餐饮空间</option>
                                        <option value="娱乐空间">娱乐空间</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="portfolioRecommended">
                                    <label class="form-check-label" for="portfolioRecommended">推荐作品（会在首页轮播中显示）</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>图片</label>
                            <input type="file" class="form-control" id="portfolioImage" accept="image/*" required>
                        </div>
                        <div class="form-group">
                            <img id="imagePreview" src="" alt="图片预览" style="max-width: 200px; max-height: 150px; display: none;">
                        </div>
                        <div class="form-group">
                            <label>作品描述</label>
                            <textarea class="form-control" id="portfolioDescription" rows="3" required placeholder="请输入作品描述"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="savePortfolio()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editPortfolioModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑作品</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="editPortfolioForm">
                        <input type="hidden" id="editPortfolioId">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>作品名称</label>
                                    <input type="text" class="form-control" id="editPortfolioName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>风格</label>
                                    <select class="form-control" id="editPortfolioStyle" required>
                                        <option value="">选择风格</option>
                                        <option value="modern">现代简约</option>
                                        <option value="european">欧式风格</option>
                                        <option value="chinese">中式风格</option>
                                        <option value="minimalist">极简风格</option>
                                        <option value="industrial">工业风格</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>类型</label>
                                    <select class="form-control" id="editPortfolioType" required>
                                        <option value="">选择类型</option>
                                        <option value="vr">VR作品</option>
                                        <option value="traditional">传统作品</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>VR链接</label>
                                    <input type="text" class="form-control" id="editPortfolioVrLink" placeholder="如果是VR作品，请输入VR链接">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>分类</label>
                                    <select class="form-control" id="editPortfolioCategory" required>
                                        <option value="">选择分类</option>
                                        <option value="住宅公寓">住宅公寓</option>
                                        <option value="别墅豪宅">别墅豪宅</option>
                                        <option value="酒店民宿">酒店民宿</option>
                                        <option value="样板间">样板间</option>
                                        <option value="商业空间">商业空间</option>
                                        <option value="公共空间">公共空间</option>
                                        <option value="医疗康养">医疗康养</option>
                                        <option value="售楼处">售楼处</option>
                                        <option value="办公空间">办公空间</option>
                                        <option value="学校教育">学校教育</option>
                                        <option value="建筑">建筑</option>
                                        <option value="餐饮空间">餐饮空间</option>
                                        <option value="娱乐空间">娱乐空间</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="editPortfolioRecommended">
                                    <label class="form-check-label" for="editPortfolioRecommended">推荐作品（会在首页轮播中显示）</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>图片</label>
                            <input type="file" class="form-control" id="editPortfolioImage" accept="image/*">
                        </div>
                        <div class="form-group">
                            <img id="editImagePreview" src="" alt="图片预览" style="max-width: 200px; max-height: 150px; display: none;">
                        </div>
                        <div class="form-group">
                            <label>作品描述</label>
                            <textarea class="form-control" id="editPortfolioDescription" rows="3" required placeholder="请输入作品描述"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="updatePortfolio()">更新</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>确定要删除这个作品吗？此操作不可恢复。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">删除</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5>瑞圣合空间有限公司</h5>
                    <p>专业装修材料供应商 - 品质保证，服务至上</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>快速链接</h5>
                    <ul class="list-unstyled">
                        <li><a href="../../user端/html/index.html" class="text-light">用户端首页</a></li>
                        <li><a href="material-management.html" class="text-light">材料管理</a></li>
                        <li><a href="add-material.html" class="text-light">添加材料</a></li>
                        <li><a href="portfolio-management.html" class="text-light">作品集管理</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>联系我们</h5>
                    <p><i class="fas fa-phone me-2"></i> 13607171285</p>
                    <p><i class="fas fa-map-marker-alt me-2"></i> 湖北省·武汉市·硚口区</p>
            <p>古田二路龙湖春江郦城二期底商13栋-402</p>
                </div>
            </div>
            <hr class="bg-light">
            <p class="text-center mb-0">&copy; 2025 瑞圣合空间有限公司</p>
        </div>
    </footer>

    <script src="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/jquery-3.5.1.slim.min.js"></script>
    <script src="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/popper.min.js"></script>
    <script src="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/bootstrap.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/portfolio-management.js"></script>
</body>
</html>
