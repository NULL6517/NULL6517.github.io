<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材料管理 - 瑞圣合空间有限公司</title>
    <link rel="stylesheet" href="https://demo-html-zip.oss-cn-hangzhou.aliyuncs.com/js/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/material-management.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../../user/html/index.html">
                瑞圣合空间有限公司
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="../../user/html/index.html">用户端首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="material-management.html">材料管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="add-material.html">添加材料</a></li>
                    <li class="nav-item"><a class="nav-link" href="portfolio-management.html">作品集管理</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container text-center">
            <h1 class="display-4 font-weight-bold mb-4">材料管理系统</h1>
            <p class="lead mb-4">管理员可以增删改查材料库</p>
        </div>
    </section>

    <main class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h5 class="mb-0"><i class="fas fa-database me-2"></i>材料列表</h5>
                    </div>
                    <div class="col-md-6 text-right">
                        <button class="btn btn-light btn-sm" onclick="openAddModal()">
                            <i class="fas fa-plus me-1"></i>添加新材料
                        </button>
                        <button class="btn btn-light btn-sm" onclick="exportData()">
                            <i class="fas fa-download me-1"></i>导出数据
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索材料名称、品牌...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-control" id="categoryFilter">
                            <option value="">全部类别</option>
                            <option value="floor">地板</option>
                            <option value="tile">瓷砖</option>
                            <option value="paint">涂料</option>
                            <option value="door">门窗</option>
                            <option value="hardware">五金</option>
                            <option value="bathroom">卫浴</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary" onclick="filterMaterials()">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>材料名称</th>
                                <th>类别</th>
                                <th>品牌</th>
                                <th>价格</th>
                                <th>库存</th>
                                <th>单位</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="materialTableBody">
                        </tbody>
                    </table>
                </div>

                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-center" id="pagination">
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addMaterialModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加新材料</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="addMaterialForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>材料名称</label>
                                    <input type="text" class="form-control" id="materialName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>类别</label>
                                    <select class="form-control" id="materialCategory" required>
                                        <option value="">选择类别</option>
                                        <option value="floor">地板</option>
                                        <option value="tile">瓷砖</option>
                                        <option value="paint">涂料</option>
                                        <option value="door">门窗</option>
                                        <option value="hardware">五金</option>
                                        <option value="bathroom">卫浴</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>品牌</label>
                                    <input type="text" class="form-control" id="materialBrand" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>价格</label>
                                    <input type="number" class="form-control" id="materialPrice" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>风格</label>
                                    <select class="form-control" id="materialStyle" required>
                                        <option value="">选择风格</option>
                                        <option value="modern">现代简约</option>
                                        <option value="european">欧式风格</option>
                                        <option value="chinese">中式风格</option>
                                        <option value="minimalist">极简风格</option>
                                        <option value="industrial">工业风格</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>库存</label>
                                    <input type="number" class="form-control" id="materialStock" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>单位</label>
                                    <input type="text" class="form-control" id="materialUnit" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>规格</label>
                            <input type="text" class="form-control" id="materialSpec">
                        </div>
                        <div class="form-group">
                            <label>图片</label>
                            <input type="file" class="form-control" id="materialImage" accept="image/*">
                        </div>
                        <div class="form-group">
                            <img id="imagePreview" src="" alt="图片预览" style="max-width: 200px; max-height: 150px; display: none;">
                        </div>
                        <div class="form-group">
                            <label>描述</label>
                            <textarea class="form-control" id="materialDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveMaterial()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editMaterialModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑材料</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="editMaterialForm">
                        <input type="hidden" id="editMaterialId">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>材料名称</label>
                                    <input type="text" class="form-control" id="editMaterialName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>类别</label>
                                    <select class="form-control" id="editMaterialCategory" required>
                                        <option value="">选择类别</option>
                                        <option value="floor">地板</option>
                                        <option value="tile">瓷砖</option>
                                        <option value="paint">涂料</option>
                                        <option value="door">门窗</option>
                                        <option value="hardware">五金</option>
                                        <option value="bathroom">卫浴</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>品牌</label>
                                    <input type="text" class="form-control" id="editMaterialBrand" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>价格</label>
                                    <input type="number" class="form-control" id="editMaterialPrice" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>风格</label>
                                    <select class="form-control" id="editMaterialStyle" required>
                                        <option value="">选择风格</option>
                                        <option value="modern">现代简约</option>
                                        <option value="european">欧式风格</option>
                                        <option value="chinese">中式风格</option>
                                        <option value="minimalist">极简风格</option>
                                        <option value="industrial">工业风格</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>库存</label>
                                    <input type="number" class="form-control" id="editMaterialStock" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>单位</label>
                                    <input type="text" class="form-control" id="editMaterialUnit" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>规格</label>
                            <input type="text" class="form-control" id="editMaterialSpec">
                        </div>
                        <div class="form-group">
                            <label>图片</label>
                            <input type="file" class="form-control" id="editMaterialImage" accept="image/*">
                        </div>
                        <div class="form-group">
                            <img id="editImagePreview" src="" alt="图片预览" style="max-width: 200px; max-height: 150px; display: none;">
                        </div>
                        <div class="form-group">
                            <label>描述</label>
                            <textarea class="form-control" id="editMaterialDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="updateMaterial()">更新</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>确定要删除这个材料吗？此操作不可恢复。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">删除</button>
                </div>
            </div>
        </div>
    </div>

        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5>瑞圣合空间有限公司</h5>

</body>
